name: macOS build

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build on macOS
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.13.7'

    - name: Toolchain Cache
      id: mac-toolchain
      uses: actions/cache@v4
      with:
        path: ~/mac-toolchain
        key: ${{ runner.os }}-${{ runner.arch }}-toolchain-${{ hashFiles('**/scripts/mac-toolchain-build') }}

    - name: Cargo-C Toolchain Cache
      id: mac-cargo-c-toolchain
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/cargo-capi
          ~/.cargo/bin/cargo-cbuild
          ~/.cargo/bin/cargo-cinstall
        key: ${{ runner.os }}-${{ runner.arch }}-cargo-c-toolchain-${{ hashFiles('**/scripts/mac-toolchain-build') }}

    - name: Setup Environment
      run: |
        echo ~/mac-toolchain/bin >> $GITHUB_PATH
        rustup target add x86_64-apple-darwin
        xcodebuild -downloadComponent MetalToolchain || true

    - name: Setup Toolchain
      if: steps.mac-toolchain.outputs.cache-hit != 'true'
      run: |
        pip install setuptools
        scripts/mac-toolchain-build ~/mac-toolchain

    - name: Setup Cargo-C Toolchain
      if: steps.mac-cargo-c-toolchain.outputs.cache-hit != 'true'
      run: |
        cargo install cargo-c

    - name: Build HandBrake
      run: |
        ./configure
        cd build
        make -j9 cli

    - name: Generate Test Video
      run: |
        brew install ffmpeg
        ffmpeg -y -f lavfi -i testsrc=duration=15:size=1920x1080:rate=60 -c:v h264 test.mp4

    - name: Run Memory Leak Test
      run: |
        cd build
        echo "Starting encoding with VT filters..."
        
        # Run in background to sample memory
        ./HandBrakeCLI -i ../test.mp4 -o out.mp4 -e vt_h264 -q 20 --decomb --hqdn3d --comb-detect --crop 0:0:0:0 &
        PID=$!
        
        echo "Monitoring PID $PID"
        MAX_MEM=0
        
        while ps -p $PID > /dev/null; do
            MEM=$(ps -o rss= -p $PID || echo 0)
            if [ -n "$MEM" ] && [ "$MEM" -gt "$MAX_MEM" ]; then
                MAX_MEM=$MEM
            fi
            echo "Current RSS: ${MEM} KB (Max: ${MAX_MEM} KB)"
            sleep 1
        done
        
        echo "Encoding finished. Max Memory used: ${MAX_MEM} KB"
        
        if [ "$MAX_MEM" -gt 300000 ]; then
            echo "Memory exceeded 300 MB! Possible leak."
            exit 1
        fi
        echo "Memory stable."

    - name: Upload Logs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: macos-encode-logs
        path: ./build/out.mp4
